# Bootstrap configuration used on the very first deploy, BEFORE the Let's Encrypt
# cert exists. It serves the ACME challenge over plain HTTP and proxies everything
# else to the app — this lets the site come up while certbot fetches its first
# certificate. After certbot writes /etc/letsencrypt/live/leap/{fullchain,privkey}.pem
# swap nginx.conf back in and reload nginx.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 5000M;

    upstream backend  { server api:8000;    keepalive 32; }
    upstream frontend { server frontend:3000; keepalive 32; }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
