user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Replace ${DOMAIN} in this file at deploy time (or use a templated config).
    # Easy alternative: rename to leap.example.com here and check in.

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    server_tokens off;

    # Video files can be multi-GB on upload; raise the limit for the API path.
    client_max_body_size 5000M;

    # gzip on by default for textual content
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;
    gzip_proxied any;

    # Docker internal DNS — required for variable upstreams below to re-resolve
    # container IPs (otherwise nginx caches the IP from first lookup forever
    # and any container recreate → 502 until nginx itself restarts).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ----- HTTP → HTTPS redirect + ACME challenge ---------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Certbot HTTP-01 challenge files
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else: redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----- Main HTTPS server ------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        server_name _;

        # SSL certs provisioned by certbot on the host and bind-mounted into the container
        ssl_certificate     /etc/letsencrypt/live/leap/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/leap/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Long timeouts for video processing endpoints
        proxy_connect_timeout 30s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        # Common proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # NO trailing slash on proxy_pass — each upstream needs its subpath
        # preserved (api: /api/v1/*, grafana: subpath_mode, flower:
        # --url_prefix=flower).  Variable upstreams (`set $u "..."`) force
        # nginx to re-resolve via the resolver above on every request.

        location /api/ {
            set $upstream "http://api:8000";
            proxy_pass $upstream$request_uri;
        }

        location = /flower { return 301 /flower/; }
        location /flower/ {
            auth_basic           "Flower";
            auth_basic_user_file /etc/nginx/htpasswd;
            set $upstream "http://flower:5555";
            proxy_pass $upstream$request_uri;
        }

        location = /grafana { return 301 /grafana/; }
        location /grafana/ {
            auth_basic           "Grafana";
            auth_basic_user_file /etc/nginx/htpasswd;
            set $upstream "http://grafana:3000";
            proxy_pass $upstream$request_uri;
        }

        location / {
            set $upstream "http://frontend:3000";
            proxy_pass $upstream$request_uri;
        }
    }
}
