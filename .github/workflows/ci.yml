name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref so PR pushes don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + typecheck + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # api.main:lifespan() runs `create_database_if_not_exists()` + `alembic
    # upgrade head` whenever TestClient(app) enters its context. Unit tests
    # mock the queries themselves but the lifespan still needs a reachable DB.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: leap_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_DATABASE: leap_platform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      # TestClient shares one IP; 308 unit tests exceed the default 60 req/min cap.
      SECURITY_RATE_LIMIT_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Python 3.14.0
        # Pin to the exact patch — 3.14.5 hit a pytest-asyncio fixture-setup
        # regression on this codebase; 3.14.0 is what we develop against.
        run: uv python install 3.14.0

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff check + format)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check (ty)
        run: uv run python -m ty check

      - name: Unit tests
        run: uv run pytest tests/unit/ --no-cov -q

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup bypasses corepack's signature verification (which on
      # Node 22.13 rejects pnpm 11.5.0 with "Cannot find matching keyid").
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build (smoke test)
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: /api
          NEXT_TELEMETRY_DISABLED: "1"
