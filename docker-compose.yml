# Production-ish docker-compose stack for LEAP.
#
# Bring up the whole stack:
#     docker compose up -d --build
#
# Bring up only the dev infra (for `make api` running locally):
#     docker compose up -d postgres redis
#
# All persistent app data goes to S3 (Object Storage). The local `storage/`
# bind-mount is only used for ephemeral temp files (FFmpeg scratch, ASR input).
#
# Production .env (alongside docker-compose.yml) must define:
#   DB_PASSWORD, SECURITY_JWT_SECRET_KEY, SECURITY_ENCRYPTION_KEY,
#   STORAGE_S3_BUCKET, STORAGE_S3_ACCESS_KEY_ID, STORAGE_S3_SECRET_ACCESS_KEY,
#   STORAGE_S3_ENDPOINT_URL, STORAGE_S3_REGION,
#   LOKI_S3_BUCKET, LOKI_S3_ACCESS_KEY_ID, LOKI_S3_SECRET_ACCESS_KEY,
#   GRAFANA_RO_PASSWORD

services:
  # ============================================================================
  # Core data services
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: leap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: leap_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: leap_redis
    restart: unless-stopped
    # appendonly persists the queue/result backend across container restarts.
    # Required so Celery tasks that were in-flight or scheduled survive a deploy.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================================
  # Application
  # ============================================================================
  #
  # One-shot job: wait for Postgres, ensure the DB exists, run all pending
  # Alembic revisions. The three app services depend on it via
  # `service_completed_successfully` — eliminating the race that previously
  # occurred when every uvicorn worker (×4) and each Celery service ran
  # `alembic upgrade head` in parallel on startup.
  migrate:
    image: cr.yandex/${YC_REGISTRY_ID}/leap-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leap_migrate
    restart: "no"
    entrypoint: ["/app/migrate.sh"]
    command: []
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_DATABASE: leap_platform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD:-postgres}
      # Read by alembic/versions/023_grafana_ro_role.py to set the role's
      # password on first creation; subsequent re-runs are no-ops.
      GRAFANA_RO_PASSWORD: ${GRAFANA_RO_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    image: cr.yandex/${YC_REGISTRY_ID}/leap-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leap_api
    restart: unless-stopped
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_DATABASE: leap_platform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD:-postgres}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Pydantic: SecuritySettings → SECURITY_JWT_SECRET_KEY (not JWT_SECRET_KEY). Legacy fallback kept.
      SECURITY_JWT_SECRET_KEY: ${SECURITY_JWT_SECRET_KEY:-${JWT_SECRET_KEY:-docker-compose-dev-jwt-secret-min-32-characters}}
      # Observability. JSON_LOG_FILE path is tailed by Promtail — keep in
      # lockstep with monitoring/promtail.yml.
      JSON_LOG_FILE: ${JSON_LOG_FILE:-/app/logs/structured.json}
      LOG_FILE: ${LOG_FILE:-/app/logs/app.log}
      ERROR_LOG_FILE: ${ERROR_LOG_FILE:-/app/logs/error.log}
      MONITORING_PROMETHEUS_ENABLED: ${MONITORING_PROMETHEUS_ENABLED:-true}
    expose:
      - "8000"
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/logs:/app/logs
      # OAuth/AI credential JSONs written by refresh-env.sh from Lockbox —
      # host-mounted so containers pick up rotations without rebuild.
      - ./backend/config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health/live', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  celery_worker:
    image: cr.yandex/${YC_REGISTRY_ID}/leap-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leap_celery_worker
    restart: unless-stopped
    command: python -m celery -A api.celery_app worker --loglevel=info -E --queues=downloads,uploads,async_operations,processing_cpu,maintenance --concurrency=8
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_DATABASE: leap_platform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD:-postgres}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      JSON_LOG_FILE: ${JSON_LOG_FILE:-/app/logs/structured.json}
      LOG_FILE: ${LOG_FILE:-/app/logs/celery-worker.log}
      ERROR_LOG_FILE: ${ERROR_LOG_FILE:-/app/logs/celery-worker.error.log}
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/logs:/app/logs
      - ./backend/config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "/app/scripts/celery_worker_healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
          # Leave 3 cores of headroom on an 8-CPU VM for postgres, redis,
          # nginx, frontend, loki, promtail, grafana, celery_beat (none of
          # which are CPU-limited individually).
          cpus: '3.0'

  celery_beat:
    image: cr.yandex/${YC_REGISTRY_ID}/leap-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leap_celery_beat
    restart: unless-stopped
    command: python -m celery -A api.celery_app beat --loglevel=info --scheduler celery_sqlalchemy_scheduler.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_DATABASE: leap_platform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD:-postgres}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      JSON_LOG_FILE: ${JSON_LOG_FILE:-/app/logs/structured.json}
      LOG_FILE: ${LOG_FILE:-/app/logs/celery-beat.log}
      ERROR_LOG_FILE: ${ERROR_LOG_FILE:-/app/logs/celery-beat.error.log}
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M

  flower:
    image: cr.yandex/${YC_REGISTRY_ID}/leap-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leap_flower
    restart: unless-stopped
    # Skip entrypoint.sh (waits for postgres; flower doesn't need DB).
    entrypoint: ["python", "-m", "celery"]
    command: ["-A", "api.celery_app", "flower", "--port=5555", "--url_prefix=flower"]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    expose:
      - "5555"
    depends_on:
      - redis

  frontend:
    image: cr.yandex/${YC_REGISTRY_ID}/leap-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leap_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      - api

  # ============================================================================
  # Reverse proxy
  # ============================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: leap_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # On the very first deploy, mount nginx.bootstrap.conf instead until
      # certbot has issued the first certificate; then swap back. See nginx/README.md.
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot:/var/www/certbot:ro
    depends_on:
      - api
      - frontend

  # ============================================================================
  # Observability — see backend/docs/guides/MONITORING.md
  # Logs:    loguru → structured.json → promtail → loki
  # Metrics: api /metrics + celery-exporter → prometheus → grafana
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: leap_prometheus
    restart: unless-stopped
    # Subpath mode so nginx can serve /prometheus/ behind basic-auth.
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --web.external-url=/prometheus
      - --web.route-prefix=/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/prometheus/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # Queue depth + per-task duration metrics. Listens to Celery events on
  # Redis; no DB writes. Workers emit events by default.
  celery_exporter:
    image: danihodovic/celery-exporter:0.10.10
    container_name: leap_celery_exporter
    restart: unless-stopped
    environment:
      CE_BROKER_URL: redis://redis:6379/0
      CE_ACCEPT_CONTENT: "json"
    expose:
      - "9808"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  loki:
    image: grafana/loki:3.0.0
    container_name: leap_loki
    restart: unless-stopped
    # -config.expand-env=true lets Loki interpolate ${LOKI_S3_*} from env vars.
    command: -config.file=/etc/loki/local-config.yaml -config.expand-env=true
    environment:
      LOKI_S3_BUCKET: ${LOKI_S3_BUCKET}
      LOKI_S3_ACCESS_KEY_ID: ${LOKI_S3_ACCESS_KEY_ID}
      LOKI_S3_SECRET_ACCESS_KEY: ${LOKI_S3_SECRET_ACCESS_KEY}
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  promtail:
    image: grafana/promtail:3.0.0
    container_name: leap_promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - ./backend/logs:/logs:ro
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:11.0.0
    container_name: leap_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      # GF_SERVER_DOMAIN: without it Grafana redirects to http://localhost/.
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-leap-platform.ru}
      GF_SERVER_ROOT_URL: "https://%(domain)s/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Pin LEAP Overview as the default landing page for all users.
      GF_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/leap_overview.json
      # Read by monitoring/grafana_datasources.yml for the LEAP-DB datasource.
      GRAFANA_RO_PASSWORD: ${GRAFANA_RO_PASSWORD:-}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana_datasources.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
      - ./monitoring/grafana_dashboards.yml:/etc/grafana/provisioning/dashboards/leap.yml:ro
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

# Critical volumes are declared `external: true` — they must be pre-created on
# the host (scripts/vm-init.sh does this on bootstrap). This makes them survive
# `docker compose down -v`, which only wipes compose-owned volumes.
# Recovery checklist for a new host:
#   docker volume create leap_postgres_data leap_redis_data leap_loki_data \
#                        leap_prometheus_data leap_grafana_data
volumes:
  postgres_data:
    external: true
    name: leap_postgres_data
  redis_data:
    external: true
    name: leap_redis_data
  loki_data:
    external: true
    name: leap_loki_data
  prometheus_data:
    external: true
    name: leap_prometheus_data
  grafana_data:
    external: true
    name: leap_grafana_data

networks:
  default:
    name: leap_network
