version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: leap_postgres
    environment:
      POSTGRES_DB: leap_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: leap_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leap_api
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_DATABASE: leap_platform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD:-postgres}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Pydantic: SecuritySettings → SECURITY_JWT_SECRET_KEY (не JWT_SECRET_KEY). Поддержка legacy: JWT_SECRET_KEY.
      SECURITY_JWT_SECRET_KEY: ${SECURITY_JWT_SECRET_KEY:-${JWT_SECRET_KEY:-docker-compose-dev-jwt-secret-min-32-characters}}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leap_celery_worker
    command: python -m celery -A api.celery_app worker --loglevel=info --queues=downloads,uploads,async_operations,processing_cpu,maintenance --concurrency=8
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_DATABASE: leap_platform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD:-postgres}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Beat (scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leap_celery_beat
    command: python -m celery -A api.celery_app beat --loglevel=info --scheduler celery_sqlalchemy_scheduler.schedulers:DatabaseScheduler
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_DATABASE: leap_platform
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${DB_PASSWORD:-postgres}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Flower (мониторинг)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leap_flower
    # Без entrypoint.sh: там ожидание Postgres, а у Flower нет DATABASE_HOST — иначе вечный loop на localhost:5432.
    entrypoint: ["python", "-m", "celery"]
    command: ["-A", "api.celery_app", "flower", "--port=5555"]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: leap_network
