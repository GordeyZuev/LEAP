# Prometheus scrape config. Targets reach each other via the leap_network
# docker bridge — service names are hostnames.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    cluster: leap
    env: production

scrape_configs:
  - job_name: leap-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api

  - job_name: leap-celery
    metrics_path: /metrics
    static_configs:
      - targets: ["celery_exporter:9808"]
        labels:
          service: celery

  # Self-scrape — metrics_path mirrors --web.route-prefix from docker-compose.
  - job_name: prometheus
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus
