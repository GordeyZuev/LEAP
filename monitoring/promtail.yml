# Ships backend/logs/structured.json (loguru ``serialize=True``) to Loki.
#
# Label policy:
#   labels (low cardinality, indexed):
#     level, module, queue, method, route, status_code, task_name,
#     task_state, platform, exception_class
#   NOT labels (high cardinality, parsed at query time via ``| json``):
#     request_id, task_id, recording_id, user_id, duration_ms
#
# The raw JSON envelope is preserved in the log line so LogQL can pivot on
# any of the non-label fields as ``record_extra_*`` after ``| json``. Grafana
# log panels should use ``| json | line_format "{{.text}}"`` for readability.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: leap_structured
    static_configs:
      - targets: [localhost]
        labels:
          app: leap
          source: backend
          format: json
          __path__: /logs/structured.json
    pipeline_stages:
      - json:
          expressions:
            level: record.level.name
            module: record.extra.module
            queue: record.extra.queue
            platform: record.extra.platform
            method: record.extra.method
            route: record.extra.route
            status_code: record.extra.status_code
            task_name: record.extra.task_name
            task_state: record.extra.task_state
            exception_class: record.extra.exception_class
      - labels:
          level:
          module:
          queue:
          platform:
          method:
          route:
          status_code:
          task_name:
          task_state:
          exception_class:
