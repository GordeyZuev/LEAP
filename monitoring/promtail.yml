# Promtail ships application logs from the backend container's mounted log
# volume into Loki.
#
# We ingest ONLY the structured JSON sink (backend/logger.py → structured.json)
# so each event lands in Loki exactly once with rich labels (level, module,
# task_id, recording_id, user_id, queue).
#
# The plain-text *.log files are kept on the VM for human ops (`tail -f`),
# but are intentionally NOT shipped — they carry the same events and would
# double every line under another labelset.
#
# Production note: ingest is rate-limited by Loki (see limits_config in loki.yml).

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: leap_structured
    static_configs:
      - targets: [localhost]
        labels:
          app: leap
          source: backend
          format: json
          __path__: /logs/structured.json
    pipeline_stages:
      - json:
          expressions:
            level: level
            module: module
            recording_id: recording_id
            task_id: task_id
            user_id: user_id
            queue: queue
      - labels:
          level:
          module:
          recording_id:
          task_id:
          user_id:
          queue:
