<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LEAP Platform{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#f0f4f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f0f4f8;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(34,76,135,0.10);">

          <!-- Header -->
          <tr>
            <td style="background-color:#224C87;padding:28px 36px;text-align:center;">
              <!-- Logo mark — inline SVG, white stroke on blue bg -->
              <svg width="33" height="40" viewBox="0 0 220 267" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle;margin-bottom:10px;">
                <path d="M106.948 30.0078L31.6382 209.061C25.6677 223.256 37.3071 238.59 52.585 236.656L189.201 219.367" stroke="#FAFAFA" stroke-width="60" stroke-linecap="round"/>
              </svg>
              <div style="font-size:20px;font-weight:700;letter-spacing:4px;color:#ffffff;margin-bottom:2px;">LEAP</div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#ffffff;padding:36px 36px 28px;">
              <h1 style="margin:0 0 12px;font-size:20px;font-weight:700;color:#1a2d4a;line-height:1.3;">
                {% block heading %}{% endblock %}
              </h1>
              {% block body %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f8fafc;padding:18px 36px;border-top:1px solid #e2e8f0;text-align:center;">
              <p style="margin:0;font-size:11px;color:#94a3b8;line-height:1.7;">
                Это письмо отправлено автоматически — отвечать не нужно.<br>
                &copy; 2026 LEAP Platform. Все права защищены.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
